<!-- @format -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>How MNIST Works</title>
		<link rel="stylesheet" href="app.css" />
		<style>
			body {
				display: block;
				padding: 0;
				background: var(--bg);
			}

			header {
				border-bottom: 1px solid var(--border);
				padding: 32px 24px;
				background: var(--surface);
			}

			header h1 {
				max-width: 900px;
				margin: 0 auto;
				font-size: 2.5rem;
				line-height: 1.2;
			}

			#blog {
				max-width: 900px;
				margin: 0 auto;
				padding: 32px 24px;
				line-height: 1.8;
			}

			#blog h2 {
				margin-top: 40px;
				margin-bottom: 16px;
				font-size: 1.5rem;
				color: var(--text);
			}

			#blog h2:first-child {
				margin-top: 0;
			}

			#blog h3 {
				margin-top: 28px;
				margin-bottom: 12px;
				font-size: 1.15rem;
				color: var(--text);
			}

			#blog p {
				margin: 16px 0;
				color: var(--text);
			}

			#blog code {
				background: var(--btn-bg);
				padding: 3px 8px;
				border-radius: 4px;
				font-family: monospace;
				font-size: 0.9em;
				color: #79c0ff;
			}

			#blog pre {
				background: var(--btn-bg);
				padding: 16px;
				border-radius: 8px;
				border: 1px solid var(--border);
				overflow-x: auto;
				margin: 16px 0;
			}

			#blog pre code {
				background: none;
				padding: 0;
				color: #79c0ff;
			}

			#blog ul,
			#blog ol {
				margin: 16px 0;
				padding-left: 32px;
				color: var(--text);
			}

			#blog li {
				margin-bottom: 8px;
			}

			#blog a {
				color: #58a6ff;
				text-decoration: none;
			}

			#blog a:hover {
				text-decoration: underline;
			}

			footer {
				border-top: 1px solid var(--border);
				padding: 24px;
				text-align: center;
				background: var(--surface);
			}

			.back-link {
				display: inline-block;
				padding: 8px 14px;
				border: 1px solid var(--border);
				border-radius: 8px;
				background: var(--btn-bg);
				color: var(--text);
				text-decoration: none;
				font-size: 0.9rem;
			}

			.back-link:hover {
				background: var(--btn-bg-hover);
			}

			@media (max-width: 640px) {
				header {
					padding: 24px 18px;
				}

				header h1 {
					font-size: 1.75rem;
				}

				#blog {
					padding: 24px 18px;
				}

				#blog h2 {
					font-size: 1.3rem;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>How MNIST Works</h1>
		</header>

		<div id="blog"></div>

		<footer>
			<a href="index.html" class="back-link">← Back to MNIST</a>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script>
			fetch("blog.md")
				.then((r) => r.text())
				.then((md) => {
					document.getElementById("blog").innerHTML = marked.parse(md);
				})
				.catch((err) => {
					document.getElementById("blog").innerHTML =
						"<p style='color: var(--muted);'>Error loading blog post.</p>";
					console.error(err);
				});
		</script>
	</body>
</html>
